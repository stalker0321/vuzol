name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vuzol
          POSTGRES_PASSWORD: vuzol-ci-only # pragma: allowlist secret
          POSTGRES_DB: vuzol_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vuzol -d vuzol_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      VUZOL_TEST_DATABASE_DSN: postgresql://vuzol:vuzol-ci-only@127.0.0.1:5432/vuzol_test # pragma: allowlist secret
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          VUZOL_DATABASE_DSN_REFERENCE: env:VUZOL_DATABASE_DSN
          VUZOL_DATABASE_DSN: postgresql+psycopg://vuzol:vuzol-ci-only@127.0.0.1:5432/vuzol_test # pragma: allowlist secret

      - name: Lint
        run: make lint

      - name: Check formatting
        run: make format-check

      - name: Type check
        run: make type-check

      - name: Run full test suite
        run: make test

      - name: Run security checks
        run: make security

  postgresql:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Run migrations and PostgreSQL tests
        run: make test-postgres

  container:
    name: Container verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build containers
        run: docker compose build
