services:
  postgres:
    image: postgres:16.13-bookworm
    environment:
      POSTGRES_DB: vuzol
      POSTGRES_USER: vuzol
      POSTGRES_PASSWORD: ${VUZOL_POSTGRES_PASSWORD:-vuzol-local-only} # pragma: allowlist secret
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vuzol -d vuzol"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/dev/init-test-db.sql:/docker-entrypoint-initdb.d/10-test-database.sql:ro
    restart: unless-stopped

  app:
    build: .
    environment:
      VUZOL_ENVIRONMENT: development
      VUZOL_HOST: 0.0.0.0
      VUZOL_PORT: 8000
      VUZOL_SERVICE_NAME: vuzol
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    init: true
    restart: unless-stopped

  worker:
    build: .
    command: ["vuzol-worker"]
    environment:
      VUZOL_ENVIRONMENT: development
      VUZOL_SERVICE_NAME: vuzol
    init: true
    restart: unless-stopped

  telegram-ingress:
    profiles: [telegram]
    image: vuzol:local
    build: .
    command: ["vuzol-telegram"]
    environment:
      VUZOL_ENVIRONMENT: development
      VUZOL_SERVICE_NAME: vuzol
      VUZOL_REGISTRY_FILE: /app/config/registries.toml
      VUZOL_DATABASE_DSN_REFERENCE: env:VUZOL_DATABASE_DSN
      VUZOL_DATABASE_DSN: ${VUZOL_DATABASE_DSN:-postgresql+psycopg://vuzol:vuzol-local-only@postgres:5432/vuzol} # pragma: allowlist secret
      VUZOL_TELEGRAM_BOT_TOKEN_REFERENCE: env:VUZOL_TELEGRAM_BOT_TOKEN
      VUZOL_TELEGRAM_BOT_TOKEN: ${VUZOL_TELEGRAM_BOT_TOKEN:-}
      VUZOL_ALLOWED_USER_IDS: ${VUZOL_ALLOWED_USER_IDS:-[]}
      VUZOL_ALLOWED_CHAT_IDS: ${VUZOL_ALLOWED_CHAT_IDS:-[]}
    volumes:
      - ${VUZOL_REGISTRY_FILE_HOST:-./config/registries.example.toml}:/app/config/registries.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    restart: unless-stopped

  telegram-delivery:
    profiles: [telegram]
    image: vuzol:local
    build: .
    command: ["vuzol-telegram-delivery"]
    environment:
      VUZOL_ENVIRONMENT: development
      VUZOL_SERVICE_NAME: vuzol
      VUZOL_REGISTRY_FILE: /app/config/registries.toml
      VUZOL_DATABASE_DSN_REFERENCE: env:VUZOL_DATABASE_DSN
      VUZOL_DATABASE_DSN: ${VUZOL_DATABASE_DSN:-postgresql+psycopg://vuzol:vuzol-local-only@postgres:5432/vuzol} # pragma: allowlist secret
      VUZOL_TELEGRAM_BOT_TOKEN_REFERENCE: env:VUZOL_TELEGRAM_BOT_TOKEN
      VUZOL_TELEGRAM_BOT_TOKEN: ${VUZOL_TELEGRAM_BOT_TOKEN:-}
      VUZOL_ALLOWED_USER_IDS: ${VUZOL_ALLOWED_USER_IDS:-[]}
      VUZOL_ALLOWED_CHAT_IDS: ${VUZOL_ALLOWED_CHAT_IDS:-[]}
    volumes:
      - ${VUZOL_REGISTRY_FILE_HOST:-./config/registries.example.toml}:/app/config/registries.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    restart: unless-stopped

volumes:
  postgres-data:
