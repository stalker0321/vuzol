[[projects]]
id = "example"
display_name = "Example project"
repository_path = "example"
default_branch = "main"
allowed_capabilities = ["repository_read", "code_edit", "git", "project_shell"]
sandbox_profile = "project-default"
validation_sandbox_profile = "example-validation"
enabled = false

[projects.git_delivery]
allowed_modes = ["retain", "patch"]
approval_required = []

[projects.network]
enabled = false
destinations = []

[[profiles]]
id = "example-api"
provider = "openai-compatible"
model = "replace-me"
api_base_url = "https://api.example.com/v1"
launch_mode = "api"
credential_reference = "env:VUZOL_OPENAI_EXECUTOR_API_KEY"
credential_required = true
capabilities = ["repository_read"]
concurrency_limit = 1
cost_class = "balanced"
roles = ["executor"]
routing_priority = 100
supported_task_types = ["general"]
fallback_profile_ids = []
sandbox_required = false
enabled = false

# Cheap model-only reviewer used for high/privileged coding.v1 results.
[[profiles]]
id = "example-reviewer"
provider = "openai-compatible"
model = "replace-me"
api_base_url = "https://api.example.com/v1"
launch_mode = "api"
credential_reference = "env:VUZOL_OPENAI_PLANNER_API_KEY"
credential_required = true
capabilities = []
concurrency_limit = 4
context_limit = 100000
output_limit = 2000
cost_class = "cheap"
roles = ["reviewer", "planner"]
routing_priority = 40
supported_task_types = ["architecture", "coding", "research", "infrastructure", "file_processing", "general"]
fallback_profile_ids = []
sandbox_required = false
input_cost_units_per_million = 0.05
output_cost_units_per_million = 0.40
minimum_unknown_usage_cost = 0.001
enabled = false

