# Forum layout (product policy): permanently pinned top→bottom =
# История, Статус проектов, Апрувы, Новый проект. Active project topics pin next.
# System topic exists but is not in the fixed pin stack. Display names for these
# kinds are enforced by vuzol.telegram.layout regardless of TOML text.

[[topics]]
chat_id = -1000000000000
message_thread_id = 1
kind = "changelog"
accepts_new_tasks = false
default_workflow = "simple_model_task"
enabled = false

