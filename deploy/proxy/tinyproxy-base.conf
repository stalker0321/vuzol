# Tinyproxy static base configuration (immutable, for hardened proxy image)
#
# Provides process, listen, and logging settings only.
# Security policy directives (Filter*, ConnectPort 443, etc.) MUST come from
# the rendered fragment produced by render_tinyproxy_policy().
#
# Do not add permissive rules, auth, upstream, or reverse proxy settings here.
# This file + the security fragment = complete config expected at runtime.

User 10002
Group 10002
Port 8888
Listen 0.0.0.0
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
# Log to stderr (container best practice); avoid /dev/stdout "changed" issue in some envs
# LogFile omitted or /dev/null to avoid "file changed" startup issues in hardened containers
# LogLevel Info
LogLevel Info
PidFile "/run/tinyproxy/tinyproxy.pid"
MaxClients 50

# The following are intentionally omitted here and supplied by the renderer:
# ConnectPort 443
# Filter "/etc/tinyproxy/filter"
# FilterDefaultDeny Yes
# FilterType ere
# FilterURLs Off
# FilterCaseSensitive On
