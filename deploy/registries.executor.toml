[[projects]]
id = "vuzol"
display_name = "Vuzol"
repository_path = "vuzol"
default_branch = "main"
allowed_capabilities = ["repository_read", "code_edit", "git", "project_shell"]
sandbox_profile = "project-default"
validation_sandbox_profile = "vuzol-validation"
enabled = true

[projects.git_delivery]
allowed_modes = ["retain", "patch"]
approval_required = []

[projects.network]
enabled = true
destinations = [
  { url = "https://chatgpt.com", purpose = "Codex subscription runtime" },
  { url = "https://cli-chat-proxy.grok.com", purpose = "Grok subscription inference" },
  { url = "https://auth.x.ai", purpose = "Grok subscription authentication" },
]

[[profiles]]
id = "codex-subscription-prod"
provider = "codex"
model = "codex"
launch_mode = "cli"
credential_required = false
capabilities = ["repository_read", "code_edit", "git", "project_shell"]
concurrency_limit = 1
cost_class = "strong"
roles = ["executor", "planner"]
routing_priority = 200
supported_task_types = ["coding"]
fallback_profile_ids = ["grok-subscription-a", "grok-subscription-b"]
sandbox_required = true
runtime_identity = "vuzol-executor"
state_directory = "/var/lib/vuzol-provider-state/codex-subscription-prod"
enabled = true

[profiles.agent_runtime_contract]
cli_version = "codex-cli 0.144.1"
edit_mechanism = "shell_backed_repository_tools"
working_directory = "/workspace"
writable_roots = ["/workspace"]
protected_roots = ["/workspace/.git"]
structured_output_source = "final_agent_message_json"
inner_sandbox_mode = "provider_managed"
supports_read = true
supports_search = true
supports_edit = true
supports_git = false
supports_network = false
supports_local_checks = false

[profiles.runtime_network]
enabled = true
destinations = [
  { url = "https://chatgpt.com", purpose = "Codex subscription runtime" },
]

