[[sandboxes]]
id = "project-default"
image = "vuzol-sandbox@sha256:d5d6331d50b9d4d3a53f74b47195b5bea0215d42434e34ba3e51318b5ace7526"
uid = 10001
gid = 10001
cpu_count = 1.0
memory_bytes = 1073741824
pids_limit = 128
tmpfs_bytes = 134217728
open_files_limit = 1024
output_bytes = 10000000
timeout_seconds = 3600
stop_grace_seconds = 10
network_mode = "https_proxy"
inner_codex_sandbox_required = true
enabled = true

[[projects]]
id = "vuzol"
display_name = "Vuzol"
repository_path = "vuzol"
default_branch = "main"
allowed_capabilities = ["repository_read", "code_edit", "git", "project_shell"]
sandbox_profile = "project-default"
enabled = true

[projects.git_delivery]
allowed_modes = ["retain", "patch"]
approval_required = []

[projects.network]
enabled = true
destinations = [
  { url = "https://chatgpt.com", purpose = "Codex subscription runtime" },
]

[[profiles]]
id = "codex-subscription-prod"
provider = "codex"
model = "codex"
launch_mode = "cli"
credential_required = false
capabilities = ["repository_read", "code_edit", "git", "project_shell"]
concurrency_limit = 1
cost_class = "strong"
roles = ["executor", "planner"]
routing_priority = 200
supported_task_types = ["coding"]
fallback_profile_ids = []
sandbox_required = true
runtime_identity = "vuzol-executor"
state_directory = "/var/lib/vuzol-provider-state/codex-subscription-prod"
enabled = true
