[[projects]]
id = "vuzol"
display_name = "Vuzol"
repository_path = "vuzol"
default_branch = "main"
allowed_capabilities = ["repository_read", "code_edit", "git", "project_shell"]
sandbox_profile = "project-default"
validation_sandbox_profile = "vuzol-validation"
enabled = true

[[projects.validation_commands]]
name = "tests"
argv = ["make", "test"]

[[projects.validation_commands]]
name = "format"
argv = ["make", "format-check"]

[[projects.validation_commands]]
name = "lint"
argv = ["make", "lint"]

[[projects.validation_commands]]
name = "types"
argv = ["make", "type-check"]

[projects.git_delivery]
allowed_modes = ["retain", "patch", "apply"]
approval_required = ["apply"]

[projects.network]
enabled = true
destinations = [
  { url = "https://chatgpt.com", purpose = "Codex subscription runtime" },
  { url = "https://cli-chat-proxy.grok.com", purpose = "Grok subscription inference" },
  { url = "https://auth.x.ai", purpose = "Grok subscription authentication" },
]

[[profiles]]
id = "openai-planner-prod"
provider = "openai-compatible"
model = "gpt-5-nano-2025-08-07"
api_base_url = "https://api.openai.com/v1"
launch_mode = "api"
credential_reference = "env:VUZOL_OPENAI_PLANNER_API_KEY"
credential_required = true
capabilities = []
concurrency_limit = 10
context_limit = 100000
output_limit = 1000
cost_class = "cheap"
roles = ["planner", "reviewer"]
routing_priority = 50
supported_task_types = ["architecture", "coding", "research", "infrastructure", "file_processing", "general"]
fallback_profile_ids = []
sandbox_required = false
input_cost_units_per_million = 0.05
output_cost_units_per_million = 0.40
minimum_unknown_usage_cost = 0.001
enabled = true

[[profiles]]
id = "codex-subscription-prod"
provider = "codex"
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
launch_mode = "cli"
credential_required = false
capabilities = ["repository_read", "code_edit", "git", "project_shell"]
concurrency_limit = 1
cost_class = "strong"
roles = ["executor", "planner"]
routing_priority = 200
supported_task_types = ["architecture", "coding"]
fallback_profile_ids = ["grok-subscription-a", "grok-subscription-b"]
sandbox_required = true
runtime_identity = "vuzol-executor"
state_directory = "/var/lib/vuzol-provider-state/codex-subscription-prod"
enabled = true

# Exact-tuple agent certification remains experimental and non-blocking for MVP dogfood.
# The ordinary provider sandbox and trusted finalizer continue to enforce runtime invariants.

[profiles.runtime_network]
enabled = true
destinations = [
  { url = "https://chatgpt.com", purpose = "Codex subscription runtime" },
]

